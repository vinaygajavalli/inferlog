apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: inferlog
spec:
  replicas: 2
  selector:
    matchLabels: { app: web }
  template:
    metadata:
      labels: { app: web }
    spec:
      containers:
        - name: web
          image: inferlog-web:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: inferlog-config }
            - secretRef: { name: inferlog-secrets }
          ports: [{ containerPort: 3000 }]
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 8
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: inferlog
spec:
  type: LoadBalancer # or ClusterIP behind an Ingress
  selector: { app: web }
  ports: [{ port: 80, targetPort: 3000 }]
