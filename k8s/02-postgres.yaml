apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: inferlog
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER, value: inferlog }
            - { name: POSTGRES_PASSWORD, value: inferlog }
            - { name: POSTGRES_DB, value: inferlog }
          ports: [{ containerPort: 5432 }]
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
            - { name: schema, mountPath: /docker-entrypoint-initdb.d }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "inferlog"] }
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {} # swap for a PersistentVolumeClaim in production
        - name: schema
          configMap: { name: inferlog-schema }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: inferlog
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
